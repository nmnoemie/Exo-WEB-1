<!DOCTYPE html>
<html>
    <head>
        <body>
            <form action="#" method="POST">

            <label for ="nom">Nom complet:</label>
                <input
                type="text"
                id="nom"
                name="nom"
                required>

                 <label for="email">Email:</label>
                    <input
                    type="email"
                    id="email"
                    nom="email"
                    placeholder="example@gmail.com"
                    required>
                <label for="password">Password:</label>
                    <input
                    type="password"
                    id="password"
                    nom="password"
                    minlength="8"
                    maxlength="50"
                    required>

                <label for="date de naissance">Date de naissance:</label>
                <input
                type="date"
                id="date"
                nom="date"
                max="2007-12-31"
                required>

                <label for="telephone">Téléphone:</label>
                <input
                type="tel"
                id="tel"
                nom="tel"
                pattern="[0-9]{10}"
                required>
                
                
            </form>
        </body>
    </head>
</html>
