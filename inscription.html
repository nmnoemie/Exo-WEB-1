<!DOCTYPE html>
<html>
    <head>
        <body>
            <form action="#" method="POST">

            <label for ="nom">Nom complet:</label>
                <input
                type="text"
                id="nom"
                name="nom"
                required>

                 <label for="email">Email:</label>
                    <input
                    type="email"
                    id="email"
                    nom="email"
                    placeholder="example@gmail.com"
                    required>
                <label for="password">Password:</label>
                    <input
                    type="password"
                    id="password"
                    nom="password"
                    minlength="8"
                    maxlength="50"
                    required>

                
                
            </form>
        </body>
    </head>
</html>
